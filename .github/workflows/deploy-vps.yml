name: Deploy VPS

# Trigger: push do `main` se změnami v vps-setup/ — VPS si pak stáhne kód a rebuild.
# Frontend (Astro) deployuje Vercel automaticky přes svůj webhook, tohle ho neovlivňuje.
on:
  push:
    branches: [main]
    paths:
      - 'vps-setup/**'
      - 'scripts/**'                # stock-sync skripty běží na VPS (cron + manuál)
      - 'package.json'              # deps pro stock-sync container
      - 'package-lock.json'
      - 'Dockerfile'                # build stock-sync image
      - '.github/workflows/deploy-vps.yml'

  # Manuální spuštění z GitHub UI (Actions → Deploy VPS → Run workflow)
  workflow_dispatch:

# Pouze 1 deploy v daný moment — nově pushnutý commit nahradí předchozí běh
concurrency:
  group: deploy-vps
  cancel-in-progress: false   # nech doběhnout (jinak by mohl zůstat half-state na VPS)

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detekce co se změnilo (pro conditional rebuild)
        id: changes
        run: |
          # Jaké soubory se změnily v posledním commitu?
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANGED="ALL"   # manuální trigger = rebuild všechno
          else
            CHANGED=$(git diff --name-only HEAD^ HEAD | grep -E '^(vps-setup/|scripts/|package(-lock)?\.json|Dockerfile)' || true)
          fi
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Které služby potřebují rebuild?
          REBUILD_UCL=false
          REBUILD_NGINX=false
          REBUILD_STOCK=false
          if [[ "$CHANGED" == "ALL" ]] || echo "$CHANGED" | grep -q "vps-setup/ucl-proxy/"; then
            REBUILD_UCL=true
          fi
          if [[ "$CHANGED" == "ALL" ]] || echo "$CHANGED" | grep -q "vps-setup/nginx/"; then
            REBUILD_NGINX=true
          fi
          # stock-sync image baked-in build — rebuilt když se mění scripts/, package*, Dockerfile
          if [[ "$CHANGED" == "ALL" ]] || echo "$CHANGED" | grep -qE "^(scripts/|package(-lock)?\.json|Dockerfile)"; then
            REBUILD_STOCK=true
          fi
          echo "rebuild_ucl=$REBUILD_UCL" >> $GITHUB_OUTPUT
          echo "rebuild_nginx=$REBUILD_NGINX" >> $GITHUB_OUTPUT
          echo "rebuild_stock=$REBUILD_STOCK" >> $GITHUB_OUTPUT

          echo "── Change summary ─────────"
          echo "Files: $CHANGED"
          echo "Rebuild ucl-proxy: $REBUILD_UCL"
          echo "Reload nginx: $REBUILD_NGINX"
          echo "Rebuild stock-sync: $REBUILD_STOCK"

      - name: Deploy přes SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}        # např. 62.109.137.145
          username: ${{ secrets.VPS_USER }}    # např. sfr
          key: ${{ secrets.VPS_SSH_KEY }}      # privátní část SSH deploy keye
          port: 22
          script_stop: true                     # zastaví při první chybě
          script: |
            set -euo pipefail

            REBUILD_UCL="${{ steps.changes.outputs.rebuild_ucl }}"
            RELOAD_NGINX="${{ steps.changes.outputs.rebuild_nginx }}"
            REBUILD_STOCK="${{ steps.changes.outputs.rebuild_stock }}"

            echo "▶ git pull"
            cd /opt/sfr-motor
            git fetch origin main
            git reset --hard origin/main

            cd /opt/sfr-motor/vps-setup

            if [[ "$REBUILD_UCL" == "true" ]]; then
              echo "▶ rebuild + restart ucl-proxy"
              # sfr user je v docker group → docker bez sudo
              docker compose build ucl-proxy
              docker compose up -d ucl-proxy
              sleep 3
              docker compose ps ucl-proxy
              curl -fsS http://127.0.0.1:3001/health
            else
              echo "▶ ucl-proxy beze změn, skip rebuild"
            fi

            if [[ "$REBUILD_STOCK" == "true" ]]; then
              echo "▶ rebuild stock-sync image (cron + manuál si pak vezmou novou verzi)"
              docker compose --profile cron build stock-sync
            else
              echo "▶ stock-sync beze změn, skip rebuild"
            fi

            if [[ "$RELOAD_NGINX" == "true" ]]; then
              echo "▶ kopíruje nginx configy + reload (přes sfr-deploy sudoers wrapper)"
              # Nginx config copy + reload vyžaduje root (čte /etc/nginx).
              # Sudoers rule /etc/sudoers.d/sfr-deploy povoluje absolutní cestu
              # /opt/sfr-motor/vps-setup/nginx/*.conf bez hesla — proto $(pwd)/$conf.
              for conf in nginx/*.conf; do
                base=$(basename "$conf")
                sudo /bin/cp "/opt/sfr-motor/vps-setup/$conf" "/etc/nginx/sites-available/$base"
              done
              sudo /usr/sbin/nginx -t
              sudo /bin/systemctl reload nginx
            else
              echo "▶ nginx config beze změn, skip reload"
            fi

            echo "▶ deploy OK"
