# ─────────────────────────────────────────────────────────────────────────────
# SFR Motor — Nginx reverse proxy
#
# Termuje HTTPS (Let's Encrypt) a routuje:
#   admin.sfr-motor.cz                    → Directus       (127.0.0.1:8055)
#   api.sfr-motor.cz/leasing/*            → UCL proxy      (127.0.0.1:3001)
#   api.sfr-motor.cz/files/*              → MinIO S3 API   (127.0.0.1:9000/$bucket/*)
#   api.sfr-motor.cz/health               → simple OK
#
# Kopíruje se do /etc/nginx/sites-available/ při setup-vps.sh, aktivuje se
# až po Certbot vydání SSL cert (jinak Nginx neumí dostartovat).
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect (oba hosty) ────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name admin.sfr-motor.cz api.sfr-motor.cz;

  # ACME challenge (renewal cert)
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── admin.sfr-motor.cz → Directus ────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name admin.sfr-motor.cz;

  ssl_certificate     /etc/letsencrypt/live/admin.sfr-motor.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.sfr-motor.cz/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Bezpečnostní hlavičky
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 100M;   # upload fotek + PDF

  location / {
    proxy_pass http://127.0.0.1:8055;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }
}

# ── api.sfr-motor.cz → multiple backends ─────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name api.sfr-motor.cz;

  ssl_certificate     /etc/letsencrypt/live/admin.sfr-motor.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/admin.sfr-motor.cz/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 100M;

  # Health endpoint — pro monitoring
  location = /health {
    add_header Content-Type application/json;
    return 200 '{"status":"ok"}';
  }

  # UCL leasing kalkulačka — Node mikroservis (fixed IP = UCL whitelist OK)
  location /leasing/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # UCL response někdy trvá 5–10s
    proxy_connect_timeout 15s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # MinIO public files — fotky, PDF, .docx
  # Frontend volá: https://api.sfr-motor.cz/files/sfr-motor-uploads/abc.jpg
  # Nginx přepíše na: http://127.0.0.1:9000/sfr-motor-uploads/abc.jpg
  location /files/ {
    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # MinIO timeouty
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Aggressive cache pro statické assety
    proxy_cache_valid 200 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # Default fallback
  location / {
    return 404 '{"error":"Not Found"}';
    add_header Content-Type application/json;
  }
}
