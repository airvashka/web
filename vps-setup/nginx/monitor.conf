# ─────────────────────────────────────────────────────────────────────────────
# SFR Motor — Netdata monitoring reverse proxy
#
# monitor.sfr-motor.cz → 127.0.0.1:19999 (Netdata)
# Basic auth ochrana — /etc/nginx/.htpasswd-monitor
# SSL z Let's Encrypt
# ─────────────────────────────────────────────────────────────────────────────

server {
  listen 80;
  listen [::]:80;
  server_name monitor.sfr-motor.cz;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name monitor.sfr-motor.cz;

  ssl_certificate     /etc/letsencrypt/live/monitor.sfr-motor.cz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/monitor.sfr-motor.cz/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  # Basic auth — chrání před veřejným přístupem
  auth_basic           "SFR Motor Monitoring";
  auth_basic_user_file /etc/nginx/.htpasswd-monitor;

  # Netdata WebSocket potřebuje upgrade headers
  location / {
    proxy_pass http://127.0.0.1:19999;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (Netdata real-time charts)
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Netdata může mít dlouhé requesty
    proxy_connect_timeout 30s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # Pass auth header pro Netdata (Netdata samo nemá auth — Nginx to dělá)
    proxy_set_header Authorization     $http_authorization;
    proxy_pass_header Server;
  }
}
